services:
  app:
    build: .
    container_name: aldmic_app
    working_dir: /app/laravel
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - mysql

  mysql:
    image: mysql:5.7
    container_name: aldmic_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: dafah2545
      MYSQL_DATABASE: aldmic_test